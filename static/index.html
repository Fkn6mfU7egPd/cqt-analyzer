<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CQT analyzer</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <h1>CQT Analyzer</h1>
    <input type="file" id="file_input" accept="audio/*"><button type="button" id="analyze">解析する</button><br>
    <canvas id="canvas" width="800" height="600"></canvas><br>
    <canvas id="hovered_canvas" width="800" height="32"></canvas><br>
    <audio id="audio" controls></audio><br>
    <span>Total loudness: <b id="loudness">--</b>dB</span><br>
    <span>Peak frequency: <b id="peak">--</b>Hz</span><br>
    <span>Peak loudness: <b id="peak_loudness">--</b>dB</span>
    <script src="./script.js" type="module"></script>
  </body>
</html>
